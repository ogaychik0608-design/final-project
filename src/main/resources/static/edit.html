<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Редактировать</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
  <div class="card shadow border-0 mx-auto" style="max-width: 450px; border-radius: 20px;">
    <div class="card-body p-4">
      <h2 class="mb-4 fw-bold text-primary text-center">Редактирование</h2>
      <form id="editForm">
        <div class="mb-3"><label class="fw-bold">Название</label><input type="text" id="name" class="form-control" required></div>
        <div class="mb-3"><label class="fw-bold">Цена (₸)</label><input type="number" id="price" class="form-control" required></div>
        <div class="mb-4"><label class="fw-bold">Остаток</label><input type="number" id="stock" class="form-control" required></div>
        <button type="submit" class="btn btn-primary w-100 rounded-pill">Сохранить</button>
        <a href="index.html" class="btn btn-link w-100 text-center text-decoration-none text-muted mt-2">Отмена</a>
      </form>
    </div>
  </div>
</div>
<script>
  const id = new URLSearchParams(window.location.search).get('id');
  async function load() {
    const res = await fetch(`/api/products/${id}`);
    const p = await res.json();
    document.getElementById('name').value = p.name;
    document.getElementById('price').value = p.price;
    document.getElementById('stock').value = p.stockQuantity;
  }
  document.getElementById('editForm').onsubmit = async (e) => {
    e.preventDefault();
    const body = {
      name: document.getElementById('name').value,
      price: document.getElementById('price').value,
      stockQuantity: document.getElementById('stock').value
    };
    await fetch(`/api/products/${id}`, {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    });
    window.location.href = 'index.html';
  };
  load();
</script>
</body>
</html>
