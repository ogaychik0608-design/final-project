<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyStore KZ | Склад</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --main-color: #00afca;
    }
    .navbar {
      background-color: var(--main-color);
    }
    .product-card {
      border-radius: 15px;
      border: none;
      transition: 0.3s;
      height: 100%;
    }
    .product-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }
    .page-link {
      color: var(--main-color);
      cursor: pointer;
      border-radius: 8px !important;
      margin: 0 3px;
    }
    .active > .page-link {
      background-color: var(--main-color) !important;
      border-color: var(--main-color) !important;
      color: white !important;
    }
    .btn-primary {
      background-color: var(--main-color);
      border: none;
    }
    .btn-primary:hover {
      background-color: #008fa5;
    }
  </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark shadow mb-4">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">MyStore KZ</a>
    <a href="add.html" class="btn btn-warning fw-bold shadow-sm">+ ДОБАВИТЬ ТОВАР</a>
  </div>
</nav>

<div class="container">
  <div class="row mb-4">
    <div class="col-md-6 mx-auto d-flex">
      <input type="text" id="searchInput" class="form-control me-2 rounded-pill shadow-sm" placeholder="Поиск по названию...">
      <button class="btn btn-primary rounded-pill px-4 shadow-sm" onclick="loadProducts(0)">Найти</button>
    </div>
  </div>

  <div class="row row-cols-1 row-cols-md-3 g-4" id="productList">
    <div class="col-12 text-center py-5">
      <div class="spinner-border text-info" role="status"></div>
      <p class="mt-2 text-muted">Загрузка склада...</p>
    </div>
  </div>

  <nav class="mt-5">
    <ul class="pagination justify-content-center" id="pagination"></ul>
  </nav>
</div>

<script>
  async function loadProducts(page = 0) {
    const searchInput = document.getElementById('searchInput');
    const query = searchInput ? searchInput.value.trim() : "";

    let url = `/api/products?page=${page}&size=6`;
    if (query) {
      url += `&search=${encodeURIComponent(query)}`;
    }

    console.log("Отправка запроса на:", url);

    try {
      const response = await fetch(url);

      if (!response.ok) {
        const errorData = await response.text();
        throw new Error(`Ошибка сервера (500). Проверьте логи IDEA.`);
      }

      const data = await response.json();
      console.log("Данные от сервера:", data);

      const products = data.content || [];
      const list = document.getElementById('productList');

      if (products.length === 0) {
        list.innerHTML = `
                    <div class="col-12 text-center py-5">
                        <h3 class="text-muted">На складе пока пусто</h3>
                        <p>Добавьте первый товар, чтобы он появился в списке.</p>
                    </div>`;
        document.getElementById('pagination').innerHTML = '';
        return;
      }

      list.innerHTML = products.map(p => `
                <div class="col">
                    <div class="card product-card shadow-sm">
                        <div class="card-body d-flex flex-column">
                            <h5 class="fw-bold text-dark">${p.name || 'Без названия'}</h5>
                            <p class="text-primary fs-4 fw-bold mb-3">
                                ${p.price ? p.price.toLocaleString('ru-KZ') : '0'} ₸
                            </p>
                            <p class="text-muted small mt-auto">
                                Остаток на складе: <span class="badge bg-secondary">${p.stockQuantity || 0} шт.</span>
                            </p>
                            <div class="d-grid gap-2 mt-3">
                                <a href="edit.html?id=${p.id}" class="btn btn-outline-primary btn-sm rounded-pill">Изменить</a>
                                <a href="details.html?id=${p.id}" class="btn btn-outline-info btn-sm rounded-pill">Детали</a>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');

      renderPagination(data.totalPages, data.number);

    } catch (error) {
      console.error("Ошибка в JS:", error);
      document.getElementById('productList').innerHTML = `
                <div class="alert alert-danger w-100 text-center shadow-sm">
                    <strong>Внимание!</strong> ${error.message}<br>
                    <small>Возможно, возникла циклическая ссылка в JSON из-за категорий.</small>
                </div>`;
    }
  }

  function renderPagination(total, current) {
    const pag = document.getElementById('pagination');
    if (total <= 1) {
      pag.innerHTML = '';
      return;
    }

    let html = '';
    html += `<li class="page-item ${current === 0 ? 'disabled' : ''}">
                    <a class="page-link" onclick="loadProducts(${current - 1})">Назад</a>
                 </li>`;

    for (let i = 0; i < total; i++) {
      html += `<li class="page-item ${i === current ? 'active' : ''}">
                        <a class="page-link" onclick="loadProducts(${i})">${i + 1}</a>
                     </li>`;
    }

    html += `<li class="page-item ${current === total - 1 ? 'disabled' : ''}">
                    <a class="page-link" onclick="loadProducts(${current + 1})">Вперед</a>
                 </li>`;

    pag.innerHTML = html;
  }

  document.addEventListener('DOMContentLoaded', () => {
    loadProducts(0);
  });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
